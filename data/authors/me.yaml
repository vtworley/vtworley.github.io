role: PhD Candidate in Government and Politics
bio: |
  I'm a doctoral candidate in the Department of Government and Politics
  at the University of Maryland, College Park, expected to defend in
  December 2026. My research sits at the intersection of federalism,
  judicial politics, and state politics — broadly, I study how state
  attorneys general use the courts to shape, contest, and constrain
  federal authority.

  My dissertation, *Vertical Litigation, Political Polarization, and
  State Attorneys General*, examines vertical litigation between the
  federal government and the states during the contemporary era of
  partisan polarization. I'm advised by Patrick Wohlfarth, with Kristina
  Miler, Michael Hanmer, and Matthew Green (Catholic University of
  America) on my committee.

